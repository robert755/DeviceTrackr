<div class="prime-app">
  <header class="prime-header">
    <div class="prime-header-inner">
      <span class="prime-brand">Device<span class="prime-accent">Trackr</span></span>
    </div>
  </header>

  <main class="prime-main center">
    <div class="container auth-page">
      <h1>Create account</h1>
      <p class="hint">Fill in your details. Role and location appear in the tracking system.</p>

      <p class="message error" *ngIf="errorMessage">{{ errorMessage }}</p>

      <div class="panel">
        <h2>Register</h2>
        <form [formGroup]="form" (ngSubmit)="submit()">
          <label>
            Display name (optional)
            <input type="text" formControlName="name" placeholder="Leave blank to use the email local part" />
          </label>
          <label>Email *<input type="email" formControlName="email" autocomplete="username" /></label>
          <label>Password *<input type="password" formControlName="password" autocomplete="new-password" /></label>
          <label>Role *<input type="text" formControlName="role" placeholder="e.g. Developer, Manager" /></label>
          <label>Location *<input type="text" formControlName="location" placeholder="e.g. London, New York" /></label>
          <button type="submit">Create account</button>
        </form>

        <div class="auth-footer">
          <span>Already have an account? </span>
          <a routerLink="/login" class="link">Sign in</a>
        </div>
      </div>
    </div>
  </main>
</div>
