<div class="prime-app">
  <header class="prime-header">
    <div class="prime-header-inner">
      <span class="prime-brand">Device<span class="prime-accent">Trackr</span></span>
    </div>
  </header>

  <main class="prime-main center">
    <div class="container auth-page">
      <h1>Bun venit</h1>
      <p class="hint">Intră în cont pentru a gestiona dispozitivele companiei.</p>

      <p class="message error" *ngIf="errorMessage">{{ errorMessage }}</p>

      <div class="panel">
        <h2>Autentificare</h2>
        <form [formGroup]="form" (ngSubmit)="submit()">
          <label>Email<input type="email" formControlName="email" autocomplete="username" /></label>
          <label>Parolă<input type="password" formControlName="password" autocomplete="current-password" /></label>
          <button type="submit">Intră</button>
        </form>

        <div class="auth-footer">
          <span>Nu ai cont? </span>
          <a routerLink="/register" class="link">Înregistrează-te</a>
        </div>
      </div>
    </div>
  </main>
</div>
